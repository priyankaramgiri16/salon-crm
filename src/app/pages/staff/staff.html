<div class="staff-container">

  <h2>Staff Management</h2>

  <table>

    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Role</th>
        <th>Phone</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let staff of staffList">

        <td>{{ staff.id }}</td>
        <td>{{ staff.name }}</td>
        <td>{{ staff.role }}</td>
        <td>{{ staff.phone }}</td>

      </tr>

    </tbody>

  </table>

</div>
