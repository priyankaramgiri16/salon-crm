<div class="login-container">
  <div class="login-card">

    <h2>SALON CRM</h2>

    <div class="form-group">
      <label>Email</label>

      <input
        type="email"
        placeholder="Enter email"
        [(ngModel)]="email"
      />

    </div>

    <div class="form-group">
      <label>Password</label>

      <input
        type="password"
        placeholder="Enter password"
        [(ngModel)]="password"
      />

    </div>

    <button
      (click)="login()"
      [disabled]="!email || !password">

      Login

    </button>

  </div>
</div>
